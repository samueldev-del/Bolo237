name: Backend Security CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# Principe de moindre privilège : lecture seule sur le code source
permissions:
  contents: read

jobs:
  static-security-analysis:
    name: Route Security Regression Check
    runs-on: ubuntu-latest
    env:
      DATA_ENCRYPTION_KEY: "111122223333444455556666777788889999aaaabbbbccccddddeeeeffff0000"
      DATA_LOOKUP_HMAC_KEY: "0000ffffeeeeccccbbbbaaaa9999888877776666555544443333222211110000"
      ADMIN_SESSION_SECRET: "ceci_est_un_secret_de_test_pour_la_ci_github_uniquement_32_chars"
      SESSION_JWT_SECRET: "ci_test_session_secret_for_backend_security_checks_only_123456"
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/bolo237_ci?sslmode=require"
      JOB_SCRAPER_ENABLED: "false"

    # Applique par défaut le répertoire backend à toutes les commandes 'run'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        # Fixé à v4.2.2 via SHA immuable
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        # Fixé à v4.4.0 via SHA immuable
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20' # LTS recommandée (ajuste selon ton moteur local)
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies (Secure Mode)
        # Évite l'exécution de scripts de post-installation arbitraires
        run: npm ci --ignore-scripts

      - name: Run static security routes analysis
        # Exécute le script d'assertion sans nécessiter de base de données
        run: npm run test:security-routes
