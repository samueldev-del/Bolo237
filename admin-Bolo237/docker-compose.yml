services:
  bolo237-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: bolo237-admin:latest
    container_name: bolo237-admin-portal
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - .env
