<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Bolo237 Admin | Hors ligne</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fce9df 0%, #ffffff 55%);
        color: #2f1d19;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid #e9c6b6;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 20px 50px rgba(139, 67, 50, 0.12);
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.45;
        color: #5d3a31;
      }
      button {
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #c4623f;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Vous êtes hors ligne</h1>
      <p>
        La connexion internet est indisponible pour le moment. Vérifiez votre réseau puis réessayez.
      </p>
      <button type="button" onclick="location.reload()">Réessayer</button>
    </main>
  </body>
</html>
