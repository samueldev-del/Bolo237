services:
  # Nom du service (interne à Docker)
  bolo237-frontend:
    # On lui dit de construire l'image à partir du dossier actuel (.)
    build:
      context: .
      dockerfile: Dockerfile
    # Le nom que portera ton image une fois construite
    image: bolo237-frontend:latest
    # Le nom du conteneur quand il sera lancé
    container_name: bolo237-frontend-public
    # On limite l'exposition au loopback local pour eviter toute exposition LAN inutile
    ports:
      - "127.0.0.1:3000:3000"
    # Redémarrage automatique en cas de crash ou de redémarrage du serveur
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    # SÉCURITÉ : On injecte les variables d'environnement depuis ton fichier .env local
    env_file:
      - .env