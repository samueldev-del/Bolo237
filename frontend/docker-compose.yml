services:
  # Nom du service (interne à Docker)
  bolo237-admin:
    # On lui dit de construire l'image à partir du dossier actuel (.)
    build:
      context: .
      dockerfile: Dockerfile
    # Le nom que portera ton image une fois construite
    image: bolo237-admin:latest
    # Le nom du conteneur quand il sera lancé
    container_name: bolo237-admin-portal
    # On lie le port 3000 de ta machine au port 3000 du conteneur
    ports:
      - "3000:3000"
    # Redémarrage automatique en cas de crash ou de redémarrage du serveur
    restart: unless-stopped
    # SÉCURITÉ : On injecte les variables d'environnement depuis ton fichier .env local
    env_file:
      - .env