<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bolo237 | Hors ligne</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fff7f1 0%, #ffffff 100%);
        color: #161616;
      }

      .card {
        width: min(100%, 420px);
        background: #ffffff;
        border: 1px solid #f0d7cb;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(196, 98, 63, 0.12);
        padding: 28px 24px;
        text-align: center;
      }

      .badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #fff1e9;
        color: #c4623f;
        font-size: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: #585858;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        background: #da7756;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">!</div>
      <h1>Bolo237</h1>
      <p>La connexion internet est indisponible pour le moment. Vérifiez votre réseau puis réessayez.</p>
      <button type="button" onclick="location.reload()">Réessayer</button>
    </main>
  </body>
</html>
