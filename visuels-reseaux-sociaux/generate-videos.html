// ===== DRAWING =====
function createGrad(s) { const p=s.split(','); const g=ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,p[0]); g.addColorStop(1,p[1]); return g; }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }

function drawTitle(lines, y, fs) {
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lh=fs*1.25, sy=y-(lines.length-1)*lh/2;
    lines.forEach((line,i)=>{
        const yp=sy+i*lh;
        const parts=line.split(/(\{(?:orange|gold|green|white)\})/);
        let col='white', segs=[], full='';
        parts.forEach(p=>{ if(p==='{orange}'){col='#DA7756';return;} if(p==='{gold}'){col='#FFE4B5';return;} if(p==='{green}'){col='#4ADE80';return;} if(p==='{white}'){col='white';return;} if(p){segs.push({t:p,c:col});full+=p;} });
        ctx.font=`900 ${fs}px Inter, sans-serif`;
        const tw=ctx.measureText(full).width; let xp=W/2-tw/2;
        segs.forEach(s=>{ ctx.fillStyle=s.c; ctx.font=`900 ${fs}px Inter, sans-serif`; const w=ctx.measureText(s.t).width; ctx.fillText(s.t,xp+w/2,yp); xp+=w; });
    });
    return sy+lines.length*lh;
}

function drawSlide(slide, progress, slideIndex, totalSlides) {
    ctx.fillStyle=createGrad(slide.bg); ctx.fillRect(0,0,W,H);
    let y=130;
    if(slide.step){ ctx.beginPath();ctx.arc(W/2,y,32,0,Math.PI*2);ctx.fillStyle=slide.bg.includes('#DA7756')?'rgba(0,0,0,0.3)':'#DA7756';ctx.fill();ctx.fillStyle='white';ctx.font='900 28px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(slide.step,W/2,y);y+=55; }
    if(slide.emoji){ ctx.font='72px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(slide.emoji,W/2,y);y+=65; }
    if(slide.title){ y=drawTitle(slide.title,y,slide.step?42:48)+12; }
    if(slide.sub){ ctx.textAlign='center';ctx.textBaseline='top';ctx.font='600 18px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.7)';slide.sub.split('\n').forEach((l,i)=>{ctx.fillText(l,W/2,y+i*28);}); y+=slide.sub.split('\n').length*28+12; }
    if(slide.list){ ctx.textAlign='left';ctx.textBaseline='middle';const lx=W/2-250;slide.list.forEach((item,i)=>{const a=Math.max(0,Math.min(1,(progress*slide.dur-0.8-i*0.3)/0.4));ctx.globalAlpha=a;ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='600 18px Inter,sans-serif';ctx.fillText(item,lx,y+i*34);});ctx.globalAlpha=1;y+=slide.list.length*34+10; }
    if(slide.threeCards){ const cw=210,ch=130,gap=25,sx=W/2-(cw*3+gap*2)/2; slide.threeCards.forEach((c,i)=>{const x=sx+i*(cw+gap);ctx.fillStyle='rgba(255,255,255,0.06)';rr(x,y,cw,ch,12);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.stroke();ctx.font='36px serif';ctx.textAlign='center';ctx.fillText(c.emoji,x+cw/2,y+32);ctx.font='700 14px Inter,sans-serif';ctx.fillStyle='white';c.label.split('\n').forEach((l,li)=>ctx.fillText(l,x+cw/2,y+65+li*18));ctx.font='600 12px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText(c.sub,x+cw/2,y+ch-12);}); y+=ch+15; }
    if(slide.fiveSteps){ const cw=160,ch=90,gap=16,r1x=W/2-(cw*3+gap*2)/2;for(let i=0;i<3;i++){const s=slide.fiveSteps[i],x=r1x+i*(cw+gap);ctx.fillStyle='rgba(255,255,255,0.06)';rr(x,y,cw,ch,10);ctx.fill();ctx.font='28px serif';ctx.textAlign='center';ctx.fillText(s.emoji,x+cw/2,y+28);ctx.font='700 12px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.8)';s.label.split('\n').forEach((l,li)=>ctx.fillText(l,x+cw/2,y+50+li*16));}const r2x=W/2-(cw*2+gap)/2;for(let i=0;i<2;i++){const s=slide.fiveSteps[3+i],x=r2x+i*(cw+gap),y2=y+ch+12;ctx.fillStyle='rgba(255,255,255,0.06)';rr(x,y2,cw,ch,10);ctx.fill();ctx.font='28px serif';ctx.textAlign='center';ctx.fillText(s.emoji,x+cw/2,y2+28);ctx.font='700 12px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.8)';s.label.split('\n').forEach((l,li)=>ctx.fillText(l,x+cw/2,y2+50+li*16));} }
    if(slide.compare){ const bw=270,bh=180,gap=30,sx=W/2-(bw*2+gap)/2; ctx.fillStyle='rgba(239,68,68,0.1)';rr(sx,y,bw,bh,14);ctx.fill();ctx.strokeStyle='rgba(239,68,68,0.3)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#FCA5A5';ctx.font='800 16px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(slide.compare.bad.title,sx+bw/2,y+28);ctx.font='600 14px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.65)';slide.compare.bad.items.forEach((it,i)=>ctx.fillText(it,sx+bw/2,y+58+i*28)); const gx=sx+bw+gap;ctx.fillStyle='rgba(74,222,128,0.1)';rr(gx,y,bw,bh,14);ctx.fill();ctx.strokeStyle='rgba(74,222,128,0.3)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#86EFAC';ctx.font='800 16px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(slide.compare.good.title,gx+bw/2,y+28);ctx.font='600 14px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,0.65)';slide.compare.good.items.forEach((it,i)=>ctx.fillText(it,gx+bw/2,y+58+i*28)); }
    if(slide.badge){ const by=Math.min(y+10,H-80);ctx.font='800 17px Inter,sans-serif';const bw=ctx.measureText(slide.badge).width+50;ctx.fillStyle=slide.bg.includes('#DA7756')?'rgba(0,0,0,0.3)':'#DA7756';rr(W/2-bw/2,by,bw,42,21);ctx.fill();ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(slide.badge,W/2,by+21); }
    // Progress bar
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(0,H-4,W,4);
    ctx.fillStyle='#DA7756';
    const total=totalSlides; let el=slideIndex; el+=progress;
    ctx.fillRect(0,H-4,(el/total)*W,4);
    // Counter
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='600 13px Inter,sans-serif';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText(`${slideIndex+1} / ${total}`,W-18,14);
    // Logo
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='700 14px Inter,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('bolo237.com',18,14);
}

// ===== GENERATE VIDEO =====
async function generateVideo(lang) {
    const btnFr=document.getElementById('btnFr'), btnEn=document.getElementById('btnEn');
    const status=document.getElementById('status'), progress=document.getElementById('progress');
    btnFr.disabled=true; btnEn.disabled=true;
    status.className='status rec';

    const slides = lang==='fr' ? slidesFR : slidesEN;
    const filename = lang==='fr' ? 'Bolo237-Video-FR.webm' : 'Bolo237-Video-EN.webm';
    const flag = lang==='fr' ? '🇫🇷' : '🇬🇧';

    status.textContent = `${flag} Generation en cours...`;

    // Calculate total duration to match audio
    const audioDur = lang==='fr' ? 238 : 223;
    const totalSlideDur = slides.reduce((s,sl)=>s+sl.dur, 0);
    const scale = audioDur / totalSlideDur;

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType:'video/webm;codecs=vp9', videoBitsPerSecond:5000000 });
    const chunks=[];
    recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    recorder.onstop = () => {
        const blob = new Blob(chunks, {type:'video/webm'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        btnFr.disabled=false; btnEn.disabled=false;
        status.textContent = `${flag} Video telechargee : ${filename}`;
        status.className='status done';
    };

    recorder.start();
    const FPS=30, FADE=18;

    for(let si=0; si<slides.length; si++){
        const slide = slides[si];
        const slideDurSec = slide.dur * scale;
        const totalFrames = Math.round(slideDurSec * FPS);
        progress.textContent = `Slide ${si+1}/${slides.length}`;

        for(let f=0; f<totalFrames; f++){
            const p = f/totalFrames;
            drawSlide(slide, p, si, slides.length);
            if(f<FADE){ ctx.fillStyle=`rgba(0,0,0,${1-f/FADE})`; ctx.fillRect(0,0,W,H); }
            if(f>totalFrames-FADE){ ctx.fillStyle=`rgba(0,0,0,${(f-(totalFrames-FADE))/FADE})`; ctx.fillRect(0,0,W,H); }
            await new Promise(r=>setTimeout(r,1000/FPS));
        }
    }
    // Black end
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    await new Promise(r=>setTimeout(r,500));
    recorder.stop();
}

// Preview first slide
drawSlide(slidesFR[0], 0, 0, slidesFR.length);
